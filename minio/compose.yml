services:
  minio:
    image: minio/minio:latest
    container_name: hermes-minio
    restart: unless-stopped
    env_file:
      - .env
    command: server /data --console-address ":9101"
    environment:
      # Credenciales raíz del almacén S3-compatible. SOLO local: en AWS se usan credenciales/rol reales.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hermes_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-hermes_minio_local}
    ports:
      - "${MINIO_API_PORT:-9100}:9000"     # API S3 (la usa scheduling-service como endpoint)
      - "${MINIO_CONSOLE_PORT:-9101}:9101" # Consola web para inspeccionar objetos
    volumes:
      - hermes_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Job efímero: crea el bucket de anexos al arrancar (idempotente). Equivale al bootstrap que en AWS
  # haría Terraform/CloudFormation. Termina tras crear el bucket; no queda corriendo.
  minio-bootstrap:
    image: minio/mc:latest
    container_name: hermes-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-hermes_minio} ${MINIO_ROOT_PASSWORD:-hermes_minio_local} &&
      mc mb --ignore-existing local/${MINIO_REQUIREMENT_FILES_BUCKET:-hermes-requirement-files} &&
      echo 'Bucket listo: ${MINIO_REQUIREMENT_FILES_BUCKET:-hermes-requirement-files}'
      "

volumes:
  hermes_minio_data:
    name: hermes_minio_data
