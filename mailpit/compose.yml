services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: hermes-mailpit
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Acepta cualquier credencial SMTP y TLS inseguro: es un buzón de captura para desarrollo.
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      # Persiste los correos capturados entre reinicios.
      MP_DATABASE: /data/mailpit.db
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"   # SMTP (lo usa notification-service)
      - "${MAILPIT_UI_PORT:-8025}:8025"     # UI web para ver los correos
    volumes:
      - hermes_mailpit_data:/data
    healthcheck:
      # 'readyz' es el subcomando de healthcheck que trae la imagen (distroless, sin shell).
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  hermes_mailpit_data:
    name: hermes_mailpit_data
