services:
  sonarqube:
    build:
      context: .
    image: hermes-sonarqube:local
    container_name: hermes-sonarqube
    restart: unless-stopped
    depends_on:
      sonar-db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/${SONAR_DB_NAME:-sonar}
      SONAR_JDBC_USERNAME: ${SONAR_DB_USER:-sonar}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    ports:
      # Host 9001 to avoid clashing with hermes-auth-server (port 9000).
      - "${SONAR_PORT:-9001}:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9000/api/system/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  sonar-db:
    image: postgres:17-alpine
    container_name: hermes-sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SONAR_DB_NAME:-sonar}
      POSTGRES_USER: ${SONAR_DB_USER:-sonar}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  sonarqube_data:
    name: hermes_sonarqube_data
  sonarqube_extensions:
    name: hermes_sonarqube_extensions
  sonarqube_logs:
    name: hermes_sonarqube_logs
  sonarqube_db_data:
    name: hermes_sonarqube_db_data
